<!DOCTYPE html>
<html>

<head>
  <title>Home</title>
  <meta http-equiv="content-type" content="text/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/css/tachyons.min.css" />
  <style></style>
</head>

<body class="sans-serif" v-scope>
  <header>
    <div class="bg-black-90  pa3 w-100 flex white">
      <h1 class=" white f5 b">
        <a class="white no-underline" href="/">App</a>
      </h1>
      <p v-if="data.user" class=" white f6 pl1">
        Hi {{ data.user?.Username }}
      </p>
      <form v-if="data.user" class="db mv2 ml-auto f6" action="/logout" method="POST">
        <button class="ba bw1 b--white bg-black w-90 white tc b pointer grow pa1 mh2">
          Log out
        </button>
      </form>
      <p v-if="!data.user" class="ml-auto f6">
        <a href="/login" class="no-underline ba bw1 b--white bg-black w-90 white tc b pointer grow pa1 mh2">
          Log in
        </a>
      </p>
      <p v-if="!data.user" class=" f6">
        <a href="/register" class="no-underline ba bw1 b--white bg-black w-90 white tc b pointer grow pa1 mh2">
          Register
        </a>
      </p>
    </div>
  </header>
  <main class="ma3">
    <content />
  </main>
  <script src="petite-vue.js"></script>
  <script>
    PetiteVue
      .createApp({
        data: _STE_DATA
      })
      .mount();
  </script>
</body>

</html>
